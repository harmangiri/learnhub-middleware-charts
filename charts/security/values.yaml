# Default values for security.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

networkPolicy:
  enabled: false
  spec:
    podSelector: {}
    policyTypes:
    - Ingress
    - Egress
    ingress:
    - from:
      - ipBlock:
          cidr: 172.17.0.0/16
          except:
          - 172.17.1.0/24
      - namespaceSelector:
          matchLabels:
            "kubernetes.io/metadata.name": "my-namespace"
      - podSelector:
          matchLabels:
            app: my-app
      ports:
      - protocol: TCP
        port: 6379
    egress:
    - to:
      - ipBlock:
          cidr: 10.0.0.0/24
      ports:
      - protocol: TCP
        port: 5978
