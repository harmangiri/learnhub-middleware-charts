apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: api-gateway
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    istio: ingressgateway # use Istio default gateway implementation
    app: istio-ingressgateway-{{ .Release.Namespace }}
  servers:
    - hosts:
{{ toYaml .Values.hosts | indent 8 }}
      port:
        number: 80
        name: http
        protocol: HTTP
      tls:
        httpsRedirect: false
