{{- if .Values.networking.enabled -}}
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: learnhub-api-virtual-service
  namespace: {{ .Release.Namespace }}
spec:
  hosts:
{{ toYaml .Values.hosts | indent 2 }}
  gateways:
  - api-gateway
  http:
  - match:
    - uri:
        prefix: /api
    route:
    - destination:
        host: learnhub
        port:
          number: 8081
{{- end -}}
